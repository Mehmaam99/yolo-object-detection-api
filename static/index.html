<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO Object Detection | Mehmam AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e8e8f0; min-height: 100vh; }
  header { background: #13131f; border-bottom: 1px solid #2a2a3d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 20px; font-weight: 600; }
  header span { background: rgba(79,142,247,0.15); color: #4f8ef7; font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(79,142,247,0.3); }

  .main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
  @media(max-width:700px){ .main{grid-template-columns:1fr} }

  .panel-title { font-size: 11px; letter-spacing: 2px; color: #6b6b8a; margin-bottom: 12px; text-transform: uppercase; }

  /* Controls */
  .controls { background: #13131f; border: 1px solid #2a2a3d; border-radius: 8px; padding: 20px; height: fit-content; }

  .upload-zone { border: 2px dashed #2a2a3d; border-radius: 8px; padding: 32px 16px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
  .upload-zone:hover { border-color: #4f8ef7; background: rgba(79,142,247,0.03); }
  .upload-zone .icon { font-size: 40px; margin-bottom: 8px; }
  .upload-zone p { font-size: 12px; color: #6b6b8a; }
  .upload-zone input { display: none; }

  label.slider-label { font-size: 12px; color: #6b6b8a; display: flex; justify-content: space-between; margin-bottom: 6px; }
  label.slider-label span { color: #4f8ef7; font-weight: 600; }
  input[type=range] { width: 100%; accent-color: #4f8ef7; margin-bottom: 16px; }

  .btn { width: 100%; padding: 11px; background: #4f8ef7; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Stats */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
  .stat { background: #1a1a2a; border: 1px solid #2a2a3d; border-radius: 6px; padding: 10px; text-align: center; }
  .stat-value { font-size: 22px; font-weight: 700; color: #4f8ef7; }
  .stat-label { font-size: 10px; color: #6b6b8a; margin-top: 2px; }

  /* Results */
  .results { display: flex; flex-direction: column; gap: 16px; }

  .image-container { background: #13131f; border: 1px solid #2a2a3d; border-radius: 8px; overflow: hidden; min-height: 300px; display: flex; align-items: center; justify-content: center; }
  .image-container img { max-width: 100%; max-height: 500px; object-fit: contain; }
  .placeholder { text-align: center; color: #6b6b8a; }
  .placeholder .icon { font-size: 56px; margin-bottom: 12px; }

  .detections-list { background: #13131f; border: 1px solid #2a2a3d; border-radius: 8px; padding: 16px; max-height: 200px; overflow-y: auto; }
  .det-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #1a1a2a; border-radius: 5px; margin-bottom: 6px; font-size: 13px; }
  .det-item:last-child { margin-bottom: 0; }
  .det-label { font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .det-dot { width: 8px; height: 8px; border-radius: 50%; }
  .det-conf { font-family: monospace; font-size: 12px; color: #4f8ef7; }
  .conf-bar { height: 4px; background: #2a2a3d; border-radius: 2px; margin-top: 4px; }
  .conf-fill { height: 100%; background: #4f8ef7; border-radius: 2px; transition: width 0.5s ease; }

  .loading { display: none; text-align: center; padding: 40px; color: #6b6b8a; }
  .spinner { width: 40px; height: 40px; border: 3px solid #2a2a3d; border-top-color: #4f8ef7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<header>
  <span style="font-size:20px">👁️</span>
  <h1>YOLO Object Detection</h1>
  <span>YOLOv8 + OpenCV</span>
</header>

<div class="main">
  <div class="controls">
    <div class="panel-title">Upload & Configure</div>

    <div class="upload-zone" onclick="document.getElementById('imgInput').click()">
      <div class="icon">🖼️</div>
      <p>Click to upload image<br>JPG, PNG, WEBP supported</p>
      <input type="file" id="imgInput" accept="image/*" onchange="previewImage(this)">
    </div>

    <label class="slider-label">
      Confidence Threshold
      <span id="confValue">0.50</span>
    </label>
    <input type="range" min="0.1" max="0.95" step="0.05" value="0.5" oninput="document.getElementById('confValue').textContent=parseFloat(this.value).toFixed(2); this.dataset.val=this.value" id="confSlider">

    <button class="btn" id="detectBtn" onclick="runDetection()" disabled>🔍 Detect Objects</button>

    <div class="stats">
      <div class="stat"><div class="stat-value" id="statObjects">—</div><div class="stat-label">Objects</div></div>
      <div class="stat"><div class="stat-value" id="statTime">—</div><div class="stat-label">ms</div></div>
    </div>
  </div>

  <div class="results">
    <div class="panel-title">Detection Results</div>
    <div class="image-container" id="imageContainer">
      <div class="placeholder"><div class="icon">👁️</div><p>Upload an image to detect objects</p></div>
    </div>
    <div class="loading" id="loading"><div class="spinner"></div><p>Running YOLOv8 inference...</p></div>
    <div class="detections-list" id="detectionsList" style="display:none">
      <div class="panel-title" style="margin-bottom:10px">Detected Objects</div>
      <div id="detectionsContent"></div>
    </div>
  </div>
</div>

<script>
  let selectedFile = null;
  const colors = ['#f05555','#4f8ef7','#00e5a0','#f5a623','#a855f7','#ec4899','#14b8a6'];

  function previewImage(input) {
    selectedFile = input.files[0];
    if (!selectedFile) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('imageContainer').innerHTML = `<img src="${e.target.result}" id="previewImg">`;
      document.getElementById('detectBtn').disabled = false;
    };
    reader.readAsDataURL(selectedFile);
  }

  async function runDetection() {
    if (!selectedFile) return;
    const btn = document.getElementById('detectBtn');
    btn.disabled = true;
    btn.textContent = 'Detecting...';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('detectionsList').style.display = 'none';
    document.getElementById('imageContainer').style.display = 'none';

    const conf = document.getElementById('confSlider').value;
    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('confidence', conf);

    try {
      const res = await fetch(`/detect?confidence=${conf}`, { method: 'POST', body: formData });
      const data = await res.json();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('imageContainer').style.display = 'flex';

      if (res.ok) {
        // Show annotated image
        document.getElementById('imageContainer').innerHTML =
          `<img src="data:image/jpeg;base64,${data.annotated_image_base64}">`;

        // Update stats
        document.getElementById('statObjects').textContent = data.total_objects;
        document.getElementById('statTime').textContent = data.inference_time_ms.toFixed(0);

        // Show detections list
        if (data.detections.length > 0) {
          document.getElementById('detectionsList').style.display = 'block';
          document.getElementById('detectionsContent').innerHTML = data.detections.map((d, i) => `
            <div class="det-item">
              <div>
                <div class="det-label">
                  <div class="det-dot" style="background:${colors[i % colors.length]}"></div>
                  ${d.label}
                </div>
                <div class="conf-bar"><div class="conf-fill" style="width:${d.confidence*100}%;background:${colors[i%colors.length]}"></div></div>
              </div>
              <div class="det-conf">${(d.confidence*100).toFixed(1)}%</div>
            </div>`).join('');
        }
      } else {
        alert(`Error: ${data.detail}`);
      }
    } catch(e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('imageContainer').style.display = 'flex';
      alert(`Error: ${e.message}`);
    }
    btn.disabled = false;
    btn.textContent = '🔍 Detect Objects';
  }
</script>
</body>
</html>
